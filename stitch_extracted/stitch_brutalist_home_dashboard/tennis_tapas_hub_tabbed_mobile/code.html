<body class="font-body-md text-body-md overflow-x-hidden pb-32">
<!-- TopAppBar -->

<h1 class="font-headline-lg-mobile text-headline-lg-mobile uppercase font-bold text-on-surface">SYS_HUB_V1.0</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="sensors">sensors</span>
</div>
</header>
<main class="p-6 space-y-gutter">
<!-- Header Section -->
<section class="flex flex-col gap-2">

<div class="flex items-center gap-2">
<div class="bg-optic-yellow px-4 py-1 border-[3px] border-navy-custom brutalist-shadow-sm inline-flex items-center gap-2">
<span class="w-2 h-2 bg-navy-custom rounded-full animate-pulse"></span>
<span class="font-label-caps text-label-caps text-navy-custom">ONLINE</span>
</div>
<span class="font-label-caps text-label-caps text-on-secondary-fixed-variant opacity-70">UPTIME: 14D 02H</span>
</div>
</section>
<!-- High-Density Service Grid -->
<section class="grid grid-cols-2 gap-4 pb-8">
<!-- Home AI (Primary/Alert Style) -->
<div class="bg-terracotta-custom p-4 border-[3px] border-navy-custom brutalist-shadow active-press transition-all flex flex-col justify-between h-32">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-white text-3xl" data-icon="smart_toy">smart_toy</span>
<span class="bg-optic-yellow text-navy-custom font-label-caps text-[10px] px-1 border-2 border-navy-custom">CORE</span>
</div>
<div>
<p class="font-label-caps text-white text-xs opacity-90">HOME AI</p>
<p class="font-headline-lg-mobile text-white leading-none">ACTIVE</p>
</div>
</div>
<!-- Printer 1 (Stable Style) -->
<div class="bg-olive-custom p-4 border-[3px] border-navy-custom brutalist-shadow active-press transition-all flex flex-col justify-between h-32">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-white text-3xl" data-icon="print">print</span>
</div>
<div>
<p class="font-label-caps text-white text-xs opacity-90">PRINTER 1</p>
<p class="font-headline-lg-mobile text-white leading-none">IDLE</p>
</div>
</div>
<!-- Storage (Surface/Standard) -->
<div class="bg-surface-bright p-4 border-[3px] border-navy-custom brutalist-shadow active-press transition-all flex flex-col justify-between h-32">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-navy-custom text-3xl" data-icon="database">database</span>
</div>
<div>
<p class="font-label-caps text-navy-custom text-xs opacity-70">STORAGE</p>
<p class="font-headline-lg-mobile text-navy-custom leading-none">72%</p>
</div>
</div>
<!-- Net Traffic (Surface/Standard) -->
<div class="bg-surface-bright p-4 border-[3px] border-navy-custom brutalist-shadow active-press transition-all flex flex-col justify-between h-32">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-navy-custom text-3xl" data-icon="lan">lan</span>
</div>
<div>
<p class="font-label-caps text-navy-custom text-xs opacity-70">NET TRAFFIC</p>

</div>
</div>
<!-- Temp Sensor -->

</div>

</a>

<button class="fixed bottom-24 right-6 w-16 h-16 bg-terracotta-custom border-[3px] border-navy-custom brutalist-shadow flex items-center justify-center active-press text-white z-40">
<span class="material-symbols-outlined text-4xl" data-icon="add">add</span>
</button>
<script>
        // Micro-interaction for log simulation
        const logs = [
            "PACKET_LOSS: 0.002%",
            "SERVICE: SHELL_V2 DEPLOYED",
            "USER: GUEST ACCESS REVOKED",
            "BACKUP: COMPLETE (LOCAL_STORAGE)",
            "NODE_09: REBOOTING..."
        ];
        const logContainer = document.querySelector('.font-mono');
        setInterval(() => {
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            p.innerHTML = `<span class="opacity-50">[${time}]</span> ${logs[Math.floor(Math.random() * logs.length)]}`;
            logContainer.insertBefore(p, logContainer.lastElementChild);
            if (logContainer.children.length > 8) {
                logContainer.removeChild(logContainer.children[0]);
            }
        }, 5000);
    </script>
