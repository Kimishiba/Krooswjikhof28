<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <radialGradient id="light-glow-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffeb3b" stop-opacity="0.5" />
      <stop offset="60%" stop-color="#ffeb3b" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffeb3b" stop-opacity="0.0" />
    </radialGradient>
    <style>
      .interactive {
        cursor: pointer;
        transition: fill 0.3s ease, fill-opacity 0.3s ease, stroke-opacity 0.3s ease, filter 0.3s ease;
      }
      .light-off {
        fill: transparent !important;
        fill-opacity: 0.0 !important;
        stroke: transparent !important;
        stroke-opacity: 0.0 !important;
      }
      .interactive:hover {
        fill: #ffffff !important;
        fill-opacity: 0.1 !important;
        stroke: #ffffff !important;
        stroke-opacity: 0.3 !important;
      }
      .light-on {
        fill: url(#light-glow-radial) !important;
        stroke: none !important;
      }
    </style>
  </defs>

  <!-- Background Pokémon Hallway Image (v3) -->
  <image href="/local/pokemon_hallway_v3.jpg" x="0" y="0" width="1000" height="1000" />

  <!-- ================= OVERLAID INTERACTIVE REGIONS ================= -->

  <!-- Entrance Light / Wall Lamp (switch.hallwaylight_sonoffhallwaylight) -->
  <rect id="switch.hallwaylight_sonoffhallwaylight" class="interactive light-off" x="380" y="60" width="240" height="220" fill="transparent" stroke="transparent" />

  <!-- Middle Light / Table Lamp on Console (switch.sonoff_sonoffhallwaymiddle) -->
  <rect id="switch.sonoff_sonoffhallwaymiddle" class="interactive light-off" x="180" y="440" width="170" height="280" fill="transparent" stroke="transparent" />

</svg>
