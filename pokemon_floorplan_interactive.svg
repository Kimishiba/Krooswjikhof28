<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <radialGradient id="light-glow-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffeb3b" stop-opacity="0.5" />
      <stop offset="60%" stop-color="#ffeb3b" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffeb3b" stop-opacity="0.0" />
    </radialGradient>
    <style>
      .interactive {
        cursor: pointer;
        transition: fill 0.3s ease, fill-opacity 0.3s ease, stroke-opacity 0.3s ease, filter 0.3s ease;
      }
      .light-off {
        fill: transparent !important;
        fill-opacity: 0.0 !important;
        stroke: transparent !important;
        stroke-opacity: 0.0 !important;
      }
      .interactive:hover {
        fill: #ffffff !important;
        fill-opacity: 0.1 !important;
        stroke: #ffffff !important;
        stroke-opacity: 0.3 !important;
      }
      .light-on {
        fill: url(#light-glow-radial) !important;
        stroke: none !important;
      }
    </style>
  </defs>

  <!-- Background Pokémon Floorplan Image -->
  <image href="/local/pokemon_floorplan.jpg" x="0" y="0" width="1000" height="1000" />

  <!-- ================= OVERLAID INTERACTIVE REGIONS ================= -->

  <!-- TV Lights (switch.tv_lights) -->
  <rect id="switch.tv_lights" class="interactive light-off" x="60" y="60" width="315" height="240" fill="transparent" stroke="transparent" />

  <!-- Living Room Main Couch (light.living_room_living_room) -->
  <rect id="light.living_room_living_room" class="interactive light-off" x="60" y="300" width="346" height="387" fill="transparent" stroke="transparent" />

  <!-- Dining Table Light (switch.tablelight) -->
  <rect id="switch.tablelight" class="interactive light-off" x="281" y="718" width="469" height="250" fill="transparent" stroke="transparent" />

  <!-- Kitchen Island Light (switch.kitchenisland) -->
  <rect id="switch.kitchenisland" class="interactive light-off" x="531" y="300" width="187" height="325" fill="transparent" stroke="transparent" />

  <!-- Kitchen Counter Area / Spots (switch.kitchen) -->
  <rect id="switch.kitchen" class="interactive light-off" x="875" y="156" width="95" height="625" fill="transparent" stroke="transparent" />

</svg>
